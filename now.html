<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>now</title>
  <style>
    :root {
      --fuchsia: #FF00C8;
      --cyan:    #00F0FF;
      --blue:    #2850FF;
      --purple:  #AA00FF;
      --bg:      #060606;
      --surface: #0b0b0b;
      --text:    #cccccc;
      --dim:     #444;
    }

    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: 'Courier New', Courier, monospace;
      min-height: 100vh;
      overflow-x: hidden;
      padding-bottom: 100px;
    }

    ::-webkit-scrollbar { width: 5px; }
    ::-webkit-scrollbar-track { background: #0a0a0a; }
    ::-webkit-scrollbar-thumb { background: var(--blue); }

    #bg-canvas {
      position: fixed;
      top: 0; left: 0;
      width: 100%; height: 100%;
      z-index: 0;
      pointer-events: none;
    }

    nav {
      position: relative;
      z-index: 1;
      text-align: right;
      padding: 16px 24px 0;
      font-size: 0.78rem;
      letter-spacing: 0.2em;
    }

    nav a {
      text-decoration: none;
      margin-left: 20px;
      transition: color 0.2s;
    }

    .site-header {
      text-align: center;
      padding: 40px 20px 24px;
      position: relative;
      z-index: 1;
    }

    .deco-row {
      display: block;
      font-size: 0.75rem;
      letter-spacing: 0.6em;
      color: var(--dim);
      user-select: none;
      margin: 6px 0;
    }

    .glitch-wrap {
      position: relative;
      display: inline-block;
      margin: 10px 0;
    }

    .glitch-title {
      font-size: clamp(1.8rem, 5vw, 3.2rem);
      letter-spacing: 0.25em;
      font-weight: normal;
      text-transform: lowercase;
      animation: colorShift 10s infinite;
    }

    .glitch-title::before,
    .glitch-title::after {
      content: attr(data-text);
      position: absolute;
      top: 0; left: 0;
      width: 100%;
    }

    .glitch-title::before {
      color: var(--cyan);
      animation: glitch-a 4s infinite;
      clip-path: polygon(0 0, 100% 0, 100% 42%, 0 42%);
      opacity: 0;
    }

    .glitch-title::after {
      color: var(--purple);
      animation: glitch-b 4s infinite;
      clip-path: polygon(0 58%, 100% 58%, 100% 100%, 0 100%);
      opacity: 0;
    }

    @keyframes glitch-a {
      0%, 88%, 100% { transform: none; opacity: 0; }
      90%  { transform: translate(-3px, -1px); opacity: 0.85; }
      92%  { transform: translate(2px, 1px);   opacity: 0; }
      94%  { transform: translate(-2px, 0);    opacity: 0.85; }
    }
    @keyframes glitch-b {
      0%, 89%, 100% { transform: none; opacity: 0; }
      91%  { transform: translate(3px, 1px);   opacity: 0.85; }
      93%  { transform: translate(-2px, -1px); opacity: 0; }
      95%  { transform: translate(2px, 0);     opacity: 0.85; }
    }
    @keyframes colorShift {
      0%   { color: var(--blue);    text-shadow: 0 0 18px var(--blue); }
      33%  { color: var(--fuchsia); text-shadow: 0 0 18px var(--fuchsia); }
      66%  { color: var(--cyan);    text-shadow: 0 0 18px var(--cyan); }
      100% { color: var(--blue);    text-shadow: 0 0 18px var(--blue); }
    }

    .wrap {
      max-width: 640px;
      margin: 0 auto;
      padding: 0 20px;
      position: relative;
      z-index: 1;
    }

    .now-section {
      margin-bottom: 52px;
    }

    .section-label {
      font-size: 0.78rem;
      letter-spacing: 0.5em;
      text-transform: uppercase;
      padding-bottom: 10px;
      margin-bottom: 20px;
      border-bottom: 1px solid;
      user-select: none;
      display: flex;
      align-items: center;
      justify-content: space-between;
    }

    .now-text {
      font-size: 0.9rem;
      color: #bbb;
      white-space: pre-wrap;
      line-height: 1.9;
    }

    .now-text.empty {
      color: var(--dim);
    }

    .btn-edit-section {
      background: none;
      border: 1px solid #1e1e1e;
      color: #2a2a2a;
      font-family: inherit;
      font-size: 0.65rem;
      padding: 2px 8px;
      cursor: pointer;
      letter-spacing: 0.15em;
      transition: all 0.15s;
      display: none;
    }
    .btn-edit-section:hover { color: var(--cyan); border-color: var(--cyan); }

    .inline-edit {
      margin-top: 16px;
      display: none;
      flex-direction: column;
      gap: 8px;
    }

    .inline-edit textarea {
      width: 100%;
      min-height: 100px;
      resize: vertical;
      background: #0a0a0a;
      border: 1px solid #222;
      color: var(--text);
      font-family: inherit;
      font-size: 0.86rem;
      padding: 8px 12px;
      outline: none;
      transition: border-color 0.2s, box-shadow 0.2s;
    }

    .inline-edit textarea:focus {
      border-color: var(--blue);
      box-shadow: 0 0 6px rgba(40,80,255,0.2);
    }

    .inline-edit-btns { display: flex; gap: 8px; }

    .btn {
      background: transparent;
      border: 1px solid;
      font-family: inherit;
      font-size: 0.75rem;
      letter-spacing: 0.18em;
      padding: 6px 14px;
      cursor: pointer;
      text-transform: uppercase;
      transition: all 0.2s;
    }

    .btn-b { color: var(--blue);   border-color: var(--blue); }
    .btn-p { color: var(--purple); border-color: var(--purple); }
    .btn-f { color: var(--fuchsia);border-color: var(--fuchsia); }
    .btn-c { color: var(--cyan);   border-color: var(--cyan); }

    .btn-b:hover { background: rgba(40,80,255,0.08);  box-shadow: 0 0 12px rgba(40,80,255,0.3); }
    .btn-p:hover { background: rgba(170,0,255,0.08);  box-shadow: 0 0 12px rgba(170,0,255,0.3); }
    .btn-f:hover { background: rgba(255,0,200,0.08);  box-shadow: 0 0 12px rgba(255,0,200,0.3); }
    .btn-c:hover { background: rgba(0,240,255,0.08);  box-shadow: 0 0 12px rgba(0,240,255,0.3); }

    #login-btn {
      position: fixed;
      bottom: 24px;
      left: 24px;
      border-style: dashed;
      z-index: 90;
      font-size: 0.78rem;
    }

    #logout-btn {
      position: fixed;
      bottom: 24px;
      right: 24px;
      border-style: dashed;
      z-index: 90;
      font-size: 0.78rem;
      display: none;
    }

    .modal-overlay {
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.88);
      display: flex;
      align-items: center;
      justify-content: center;
      z-index: 200;
    }

    .modal-box {
      background: #090909;
      border: 1px solid var(--purple);
      box-shadow: 0 0 40px rgba(170,0,255,0.2);
      padding: 36px;
      width: min(340px, 90vw);
      display: flex;
      flex-direction: column;
      gap: 14px;
    }

    .modal-box h3 {
      color: var(--purple);
      font-size: 1rem;
      letter-spacing: 0.4em;
      text-shadow: 0 0 12px var(--purple);
    }

    .modal-box input { width: 100%; }

    .modal-err {
      font-size: 0.78rem;
      color: var(--fuchsia);
      min-height: 14px;
    }

    .modal-btns { display: flex; gap: 10px; }
    .modal-btns .btn { flex: 1; }

    input[type="email"],
    input[type="password"] {
      background: #0a0a0a;
      border: 1px solid #222;
      color: var(--text);
      font-family: inherit;
      font-size: 0.86rem;
      padding: 8px 12px;
      outline: none;
      transition: border-color 0.2s, box-shadow 0.2s;
    }

    input:focus {
      border-color: var(--purple);
      box-shadow: 0 0 6px rgba(170,0,255,0.25);
    }
  </style>
</head>
<body>

  <canvas id="bg-canvas"></canvas>

  <nav>
    <a href="/home.html" style="color:#444;">home</a>
    <a href="/writing.html" style="color:#444;">writing</a>
    <a href="/beings.html" style="color:#444;">beautiful beings</a>
    <a href="/now.html" style="color:var(--blue);text-shadow:0 0 8px var(--blue);">now</a>
  </nav>

  <header class="site-header">
    <span class="deco-row">◆ ◇ ◆ ◇ ◆ ◇ ◆ ◇ ◆ ◇ ◆ ◇ ◆ ◇ ◆</span>
    <div class="glitch-wrap">
      <h1 class="glitch-title" data-text="now">now</h1>
    </div>
    <span class="deco-row">◇ ◆ ◇ ◆ ◇ ◆ ◇ ◆ ◇ ◆ ◇ ◆ ◇ ◆ ◇</span>
  </header>

  <div class="wrap" id="now-sections"></div>

  <button class="btn btn-p" id="login-btn">Are you Chris?</button>
  <button class="btn btn-c" id="logout-btn">logout</button>

  <!-- LOGIN MODAL -->
  <div class="modal-overlay" id="login-modal" style="display:none">
    <div class="modal-box">
      <h3>login</h3>
      <input type="email"    id="email-in" placeholder="email"    autocomplete="email">
      <input type="password" id="pass-in"  placeholder="password" autocomplete="current-password">
      <div class="modal-err" id="login-err"></div>
      <div class="modal-btns">
        <button class="btn btn-f" id="do-login">login</button>
        <button class="btn btn-p" id="close-modal">cancel</button>
      </div>
    </div>
  </div>

  <!-- BG ASCII -->
  <script>
    (function() {
      const cv  = document.getElementById('bg-canvas');
      const cx  = cv.getContext('2d');
      const FS  = 12, LH = 17, RAD = 90, MAX_BRIGHT = 0.6;
      const CHARS = '!@#$%^&*_+=|;:,.?~ABCDEFGHIJKLMNOPQRSTUVWXYZabcdefghijklmnopqrstuvwxyz0123456789';
      const PALETTE = ['#FF00C8','#00F0FF','#2850FF','#AA00FF'];

      let cols, rows, cells, cellColors, charW;
      let mx = -9999, my = -9999;

      function setup() {
        cv.width  = window.innerWidth;
        cv.height = window.innerHeight;
        cx.font   = `${FS}px monospace`;
        charW = cx.measureText('M').width;
        cols  = Math.floor(cv.width  / charW);
        rows  = Math.floor(cv.height / LH);
        cells = [];
        cellColors = [];
        for (let i = 0; i < cols * rows; i++) {
          cells.push(CHARS[Math.floor(Math.random() * CHARS.length)]);
          cellColors.push(PALETTE[Math.floor(Math.random() * 4)]);
        }
      }

      function draw() {
        cx.clearRect(0, 0, cv.width, cv.height);
        cx.font = `${FS}px monospace`;
        const cMin = Math.max(0, Math.floor((mx - RAD) / charW));
        const cMax = Math.min(cols - 1, Math.ceil((mx + RAD) / charW));
        const rMin = Math.max(0, Math.floor((my - RAD) / LH));
        const rMax = Math.min(rows - 1, Math.ceil((my + RAD) / LH));
        for (let r = rMin; r <= rMax; r++) {
          for (let c = cMin; c <= cMax; c++) {
            const x  = c * charW;
            const y  = r * LH + FS;
            const dx = (x + charW / 2) - mx;
            const dy = (r * LH + LH / 2) - my;
            const dist = Math.sqrt(dx * dx + dy * dy);
            if (dist < RAD) {
              const t = (1 - dist / RAD) * (1 - dist / RAD);
              cx.globalAlpha = t * MAX_BRIGHT;
              cx.fillStyle   = cellColors[r * cols + c];
              cx.fillText(cells[r * cols + c], x, y);
            }
          }
        }
        cx.globalAlpha = 1;
        requestAnimationFrame(draw);
      }

      window.addEventListener('mousemove', e => { mx = e.clientX; my = e.clientY; });
      window.addEventListener('resize', setup);
      setup();
      draw();
    })();
  </script>

  <!-- Firebase -->
  <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-auth-compat.js"></script>

  <script>
    firebase.initializeApp({
      apiKey:            "AIzaSyDXJKlER0Ii-VKkVMEjLKPjx4Tv1-46DXE",
      authDomain:        "my-website-529cc.firebaseapp.com",
      projectId:         "my-website-529cc",
      storageBucket:     "my-website-529cc.firebasestorage.app",
      messagingSenderId: "698883805148",
      appId:             "1:698883805148:web:3519bc8f1775a381830919"
    });

    const db   = firebase.firestore();
    const auth = firebase.auth();

    const SECTIONS = [
      { id: 'listening',  label: 'listening',     color: '#00F0FF' },
      { id: 'reading',    label: 'reading',        color: '#AA00FF' },
      { id: 'thinking',   label: 'thinking about', color: '#FF00C8' },
    ];

    const nowEl = document.getElementById('now-sections');

    SECTIONS.forEach(({ id, label, color }) => {
      const section = document.createElement('div');
      section.className = 'now-section';
      section.innerHTML = `
        <div class="section-label" style="color:${color};border-color:${color};text-shadow:0 0 8px ${color}40">
          <span>${label}</span>
          <button class="btn-edit-section" id="edit-btn-${id}">edit</button>
        </div>
        <div class="now-text empty" id="text-${id}">. . .</div>
        <div class="inline-edit" id="edit-${id}">
          <textarea id="ta-${id}" placeholder="${label}..."></textarea>
          <div class="inline-edit-btns">
            <button class="btn btn-b" id="save-${id}">save</button>
            <button class="btn btn-p" id="cancel-${id}">cancel</button>
          </div>
        </div>`;
      nowEl.appendChild(section);

      document.getElementById(`edit-btn-${id}`).addEventListener('click', () => {
        const textEl = document.getElementById(`text-${id}`);
        document.getElementById(`ta-${id}`).value = textEl.dataset.raw || '';
        document.getElementById(`edit-${id}`).style.display = 'flex';
        document.getElementById(`ta-${id}`).focus();
      });

      document.getElementById(`save-${id}`).addEventListener('click', async () => {
        const text = document.getElementById(`ta-${id}`).value.trim();
        await db.collection('now').doc(id).set({ text }, { merge: true });
        document.getElementById(`edit-${id}`).style.display = 'none';
      });

      document.getElementById(`cancel-${id}`).addEventListener('click', () => {
        document.getElementById(`edit-${id}`).style.display = 'none';
      });

      db.collection('now').doc(id).onSnapshot(doc => {
        const text   = doc.exists ? (doc.data().text || '') : '';
        const textEl = document.getElementById(`text-${id}`);
        textEl.dataset.raw = text;
        if (text) {
          textEl.textContent = text;
          textEl.classList.remove('empty');
        } else {
          textEl.textContent = '. . .';
          textEl.classList.add('empty');
        }
      });
    });

    const loginBtn   = document.getElementById('login-btn');
    const loginModal = document.getElementById('login-modal');
    const logoutBtn  = document.getElementById('logout-btn');

    auth.onAuthStateChanged(user => {
      loginBtn.style.display  = user ? 'none'  : 'block';
      logoutBtn.style.display = user ? 'block' : 'none';
      document.querySelectorAll('.btn-edit-section').forEach(b => {
        b.style.display = user ? 'inline' : 'none';
      });
      if (!user) {
        document.querySelectorAll('.inline-edit').forEach(d => {
          d.style.display = 'none';
        });
      }
    });

    loginBtn.addEventListener('click', () => {
      loginModal.style.display = 'flex';
      document.getElementById('login-err').textContent = '';
    });

    document.getElementById('close-modal').addEventListener('click', () => {
      loginModal.style.display = 'none';
    });

    document.getElementById('do-login').addEventListener('click', async () => {
      const email = document.getElementById('email-in').value.trim();
      const pass  = document.getElementById('pass-in').value;
      try {
        await auth.signInWithEmailAndPassword(email, pass);
        loginModal.style.display = 'none';
      } catch {
        document.getElementById('login-err').textContent = 'nope. try again.';
      }
    });

    document.getElementById('pass-in').addEventListener('keydown', e => {
      if (e.key === 'Enter') document.getElementById('do-login').click();
    });

    logoutBtn.addEventListener('click', () => auth.signOut());
  </script>
</body>
</html>
